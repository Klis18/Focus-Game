<div>
    <div>
        <img src="/images/profile-photo.png" alt="profile-photo" class="rounded-2xl">
        <div class="relative">
            <div class="absolute -top-10 -left-10 w-72 h-72 bg-purple-500 rounded-full blur-3xl opacity-40"></div>
            <div class="relative z-10 p-2">
                <h3 class="text-lg my-2 flex items-center">
                    <b>Klis</b>
                    <span class="py-0.5 px-1 ml-2 bg-cyan-500 text-white text-xs rounded-2xl">Level {{level()}}</span>
                </h3>
                <div class="flex items-center gap-3 my-2">
                    <img src="/icons/experience3.png" alt="xp" class="size-8">
                    <div class="w-full bg-neutral-900 rounded-full">
                        <div class="bg-violet-400 text-xs font-medium text-white text-center p-0.5 leading-none rounded-full h-4 flex items-center justify-center" [style.width.%]="totalXP()"> {{totalXP()}} XP</div>
                    </div>
                </div>
                <p class="flex items-center gap-3 my-2">
                    <img src="/icons/coin2.png" alt="coin" class="size-8">
                    <span>{{totalCoins()}}</span>
                </p>
                <div class="mt-4">
                    <hr>
                    <h3 class="text-xs my-2">Misiones de la semana</h3>
                    <hr>
                    <div class="grid grid-cols-3 mt-4">
                        <div class="grid place-items-center gap-2 text-cyan-400 ">
                            <b class="mr-2 text-xs">Total</b>
                            <span class="text-4xl">{{totalWeekTasks()}}</span>
                        </div>
                        <div class="grid place-items-center gap-2 text-lime-400">
                            <b class="text-xs">Completadas</b>
                            <span class="text-4xl">{{weekCompletedTasks()}}</span>
                        </div>
                        <div class="grid place-items-center gap-2 text-rose-400">
                            <b class="text-xs">Pendientes</b>
                            <span class="text-4xl">{{weekPendingTasks()}}</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
