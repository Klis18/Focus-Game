<div class="bg-white/20 backdrop-blur-md border border-white/30 rounded-xl shadow-lg p-6 flex items-center gap-2 justify-between">

        <input type="checkbox" class="accent-purple-900 size-4 rounded-4xl" (click)="completeMision(taskData().id)">

            width="32" 
            height="32" 
            [ngClass]="{'fill-cyan-400':this.taskData().difficult=='Bajo',

            viewBox="0 0 256 256"><path d="M246,98.73l-56-64A8,8,0,0,0,184,32H72a8,8,0,0,0-6,2.73l-56,64a8,8,0,0,0,.17,10.73l112,120a8,8,0,0,0,11.7,0l112-120A8,8,0,0,0,246,98.73ZM222.37,96H180L144,48h36.37ZM74.58,112l30.13,75.33L34.41,112Zm89.6,0L128,202.46,91.82,112ZM96,96l32-42.67L160,96Zm85.42,16h40.17l-70.3,75.33ZM75.63,48H112L76,96H33.63Z"></path></svg>
