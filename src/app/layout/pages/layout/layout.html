<div class="p-8 w-screen">
  <div class="grid grid-cols-8 gap-3">
    <div class="col-span-2 p-4 rounded-3xl w-full blur-gradient text-white">
      <gamer-profile></gamer-profile>
    </div>
    <div class="col-span-6 bg-gray-300 p-4 rounded-3xl w-full blur-gradient">
      <div class="relative">
        <div
          class="absolute -top-10 -left-10 w-72 h-72 bg-rose-500 rounded-full blur-3xl opacity-40"
        ></div>
        <div class="relative z-10">
          <div class="flex items-center gap-4">
            <button
              class="flex items-center gap-2 rounded-4xl px-4 py-2 fill-white bg-purple-900 text-white hover:bg-purple-200 hover:border-2 hover:border-white hover:text-purple-900 hover:fill-purple-900"
              (click)="changeSection('misiones')"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 256 256">
                <path
                  d="M216,32H152a8,8,0,0,0-6.34,3.12l-64,83.21L72,108.69a16,16,0,0,0-22.64,0l-12.69,12.7a16,16,0,0,0,0,22.63l20,20-28,28a16,16,0,0,0,0,22.63l12.69,12.68a16,16,0,0,0,22.62,0l28-28,20,20a16,16,0,0,0,22.64,0l12.69-12.7a16,16,0,0,0,0-22.63l-9.64-9.64,83.21-64A8,8,0,0,0,224,104V40A8,8,0,0,0,216,32ZM52.69,216,40,203.32l28-28L80.68,188Zm70.61-8L48,132.71,60.7,120,136,195.31ZM208,100.06l-81.74,62.88L115.32,152l50.34-50.34a8,8,0,0,0-11.32-11.31L104,140.68,93.07,129.74,155.94,48H208Z"
                ></path>
              </svg>
              <span class="button-title text-xs">Misiones</span>
            </button>

            <button
              class="flex items-center gap-2 rounded-4xl px-4 py-2 fill-white bg-purple-900 text-white hover:bg-purple-200 hover:border-2 hover:border-white hover:text-purple-900 hover:fill-purple-900"
              (click)="changeSection('tienda')"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 256 256">
                <path
                  d="M232,96a7.89,7.89,0,0,0-.3-2.2L217.35,43.6A16.07,16.07,0,0,0,202,32H54A16.07,16.07,0,0,0,38.65,43.6L24.31,93.8A7.89,7.89,0,0,0,24,96h0v16a40,40,0,0,0,16,32v72a8,8,0,0,0,8,8H208a8,8,0,0,0,8-8V144a40,40,0,0,0,16-32V96ZM54,48H202l11.42,40H42.61Zm50,56h48v8a24,24,0,0,1-48,0Zm-16,0v8a24,24,0,0,1-35.12,21.26,7.88,7.88,0,0,0-1.82-1.06A24,24,0,0,1,40,112v-8ZM200,208H56V151.2a40.57,40.57,0,0,0,8,.8,40,40,0,0,0,32-16,40,40,0,0,0,64,0,40,40,0,0,0,32,16,40.57,40.57,0,0,0,8-.8Zm4.93-75.8a8.08,8.08,0,0,0-1.8,1.05A24,24,0,0,1,168,112v-8h48v8A24,24,0,0,1,204.93,132.2Z"
                ></path>
              </svg>
              <span class="button-title text-xs">Tienda</span>
            </button>
          </div>

          <div class="text-white p-4">
            @if (section() == 'misiones') {
              <div>
                <tasks />
              </div>
            }

            @if (section() == 'tienda') {
              <shop></shop>
            }
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
